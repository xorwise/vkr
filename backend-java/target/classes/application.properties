spring.application.name=transport-ontology
server.port=8080

# Ontology
ontology.file=classpath:ontology/TransportRoutes.owl
ontology.iri=http://www.semanticweb.org/ontologies/TransportRoutes#

# CORS
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS

# Overpass API
overpass.api.url=https://overpass-api.de/api/interpreter
overpass.default.bbox=59.93,30.27,60.00,30.35

# OSM import settings
# Path to pre-downloaded Overpass JSON file (faster than live API)
osm.local.file=/tmp/osm_routes.json
# Number of routes per transport type to import (bus/tram/trolleybus/metro)
osm.import.limit-per-type=5

# Logging
logging.level.ru.vkr=DEBUG
